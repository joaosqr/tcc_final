<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - World Fit</title>
    <link rel="stylesheet" href="./style/cadastro.css">
</head>
<body>

    <div class="bloco_cadastro">

        <div class="voltar">
            <a href="index.html">⬅</a>
        </div>

        <div class="cabecalho">
            <img src="https://cdn-icons-png.flaticon.com/512/747/747376.png" alt="Cadastro" class="icone">

            <span class="subtitulo">NOVO USUÁRIO</span>

            <h1 class="titulo">World Fit</h1>

            <p class="descricao">
                Crie sua conta para começar
            </p>
        </div>

        <input class="campo" type="email" placeholder="Digite seu e-mail">

        <input class="campo" type="password" placeholder="Digite sua senha">

        <input class="campo" type="text" placeholder="Digite seu CPF">

        <input class="campo" type="text" placeholder="Digite seu endereço">

        <input class="campo" type="text" placeholder="Digite seu CEP">

        <div class="sexo">
            <label>
                <input type="radio" name="sexo" required>
                Masculino
            </label>

            <label>
                <input type="radio" name="sexo">
                Feminino
            </label>
        </div>

        <button class="botao_cadastro">
            Cadastrar
        </button>

        <a href="login.html" class="link-login">
            Já possui conta? Entrar
        </a>

    </div>

</body>
</html>
