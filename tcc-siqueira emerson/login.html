<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - World Fit</title>
    <link rel="stylesheet" href="./style/login.css">
</head>
<body>

    <div class="bloco_login">
        <div class="voltar">
            <a href="index.html">⬅</a>
        </div>

        <div class="cabecalho">
            <img src="https://cdn-icons-png.flaticon.com/512/747/747376.png" alt="Login" class="icone-login">

            <span class="subtitulo">ÁREA DO CLIENTE</span>

            <h1 class="titulo">World Fit</h1>

            <p class="descricao">
                Faça login para acessar sua conta
            </p>
        </div>

        <input class="campo" type="email" placeholder="Digite seu e-mail">

        <input class="campo" type="password" placeholder="Digite sua senha">

        <button class="botao_login">Entrar</button>

    </div>

</body>
</html>
